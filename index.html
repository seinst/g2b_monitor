<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>PLANI DX 통합 관리 시스템 v3.5</title>
    <style>
        :root { --primary: #005bac; --secondary: #2b8a3e; --bg: #f8f9fa; --border: #dee2e6; }
        body { font-family: 'Pretendard', 'Malgun Gothic', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        #passwordModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f8f9fa; display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .login-box { background: white; padding: 40px; border-radius: 12px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 320px; border: 1px solid #eee; }
        #mainContent { display: none; padding: 20px; }
        .container { max-width: 1650px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .search-keywords { background: #e9ecef; padding: 10px 15px; border-radius: 6px; font-size: 13px; color: #495057; margin-bottom: 10px; border-left: 4px solid var(--primary); }
        .filter-section { background: #fff; padding: 10px 15px; border-radius: 6px; font-size: 13px; margin-bottom: 15px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .filter-left { display: flex; align-items: center; gap: 15px; }
        .filter-group { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .status-box { padding: 12px; border-radius: 6px; margin-bottom: 15px; font-size: 13px; font-weight: bold; }
        .loading { background: #fff9db; color: #f08c00; }
        .success { background: #ebfbee; color: #2b8a3e; }
        table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
        th { background: var(--primary); color: white; padding: 12px; position: sticky; top: 0; z-index: 10; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; vertical-align: middle; }
        tr:hover { background: #f8f9fa; }
        select, input[type="text"] { width: 100%; padding: 6px; border: 1px solid var(--border); border-radius: 4px; box-sizing: border-box; }
        .btn { padding: 10px 18px; border-radius: 6px; cursor: pointer; font-weight: bold; border: none; margin-left: 5px; transition: 0.2s; }
        .btn-save { background: #2b8a3e; color: white; }
        .btn-refresh { background: var(--primary); color: white; }
        .btn-sort { background: #495057; color: white; font-size: 12px; padding: 6px 12px; }
        .type-badge { padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; color: white; }
        .badge-bid { background: var(--primary); } /* 진행공고 파랑 */
        .badge-pre { background: var(--secondary); } /* 사전규격 초록 */
        .file-link { color: #d6336c; text-decoration: none; font-weight: bold; font-size: 11px; margin-right: 5px; }
    </style>
</head>
<body>

<div id="passwordModal">
    <div class="login-box">
        <h2 style="color:var(--primary); margin-top:0;">PLANI DX Monitor</h2>
        <input type="password" id="pwInput" placeholder="Password" style="width:80%; padding:12px; margin-bottom:20px; text-align:center; border:1px solid #ddd; border-radius:5px;">
        <button class="btn btn-refresh" onclick="checkPassword()" style="width:90%; margin:0;">로그인</button>
        <p id="pwError" style="color:#e03131; display:none; margin-top:15px; font-size:13px; font-weight:bold;">❌ 비밀번호 오류</p>
    </div>
</div>

<div id="mainContent">
    <div class="container">
        <div class="header">
            <h2 style="margin:0;">🚀 통합 입찰/사전규격 전략 모니터링</h2>
            <div>
                <button class="btn btn-refresh" onclick="syncData()">🔄 전체 데이터 수집 (7일)</button>
                <button class="btn btn-save" onclick="saveToCSV()">📊 CSV 내보내기</button>
            </div>
        </div>

        <div class="search-keywords">
            <strong>🔍 수집 검색어 :</strong> 홈페이지, 시스템, 플랫폼, 클라우드, 차세대, 고도화
        </div>

        <div class="filter-section">
            <div class="filter-left">
                <span style="font-weight: bold; color: var(--primary);">🎯 상태 필터:</span>
                <label class="filter-group"><input type="checkbox" class="status-filter" value="검토중" checked onchange="renderTable()"> 검토중</label>
                <label class="filter-group"><input type="checkbox" class="status-filter" value="참여" checked onchange="renderTable()"> 참여</label>
                <label class="filter-group"><input type="checkbox" class="status-filter" value="보류" checked onchange="renderTable()"> 보류</label>
                <label class="filter-group"><input type="checkbox" class="status-filter" value="미참여" checked onchange="renderTable()"> 미참여</label>
                <label class="filter-group"><input type="checkbox" class="status-filter" value="기타" checked onchange="renderTable()"> 기타</label>
            </div>
            <button class="btn btn-sort" onclick="sortData()">⇅ 중요도순 정렬</button>
        </div>

        <div id="status" class="status-box success">데이터 로드 완료</div>

        <table id="resultTable">
            <thead>
                <tr>
                    <th style="width:80px;">구분</th>
                    <th style="width:120px;">공고번호</th>
                    <th>공고명 (상세보기)</th>
                    <th style="width:160px;">수요기관</th>
                    <th style="width:110px;">등록일시</th>
                    <th style="width:140px;">첨부파일</th>
                    <th style="width:90px;">상태</th>
                    <th>의견</th>
                </tr>
            </thead>
            <tbody id="listBody"></tbody>
        </table>
    </div>
</div>

<script>
    const CORRECT_PW = "plani_dx";
    const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbwAcoqDQ0kFpkHV3FJ1JO7HDe5GPJh5VLAt6If6J0CgwXEhgtdSdFhOiMfLaNcAictl/exec"; 
    const API_KEY = decodeURIComponent('f5783d68424a4e6ae7aaada3e37732d82e7930868d612a3cc85279d2c2bb82d6');
    const KEYWORDS = ['홈페이지', '시스템', '플랫폼', '클라우드', '차세대', '고도화'];

    let dbData = JSON.parse(localStorage.getItem('plani_integrated_data') || '[]');

    function checkPassword() {
        if (document.getElementById('pwInput').value === CORRECT_PW) {
            document.getElementById('passwordModal').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            renderTable();
        } else { document.getElementById('pwError').style.display = 'block'; }
    }
    document.getElementById('pwInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') checkPassword(); });

    async function syncData() {
        const statusEl = document.getElementById('status');
        statusEl.className = 'status-box loading';
        const today = new Date();
        const ago7 = new Date(); ago7.setDate(today.getDate() - 7);
        const fmt = (d) => d.toISOString().slice(0,10).replace(/-/g, '') + "0000";
        
        let newCount = 0;

        // 1. 진행공고 수집 (입찰공고목록조회)
        async function fetchBids() {
            const url = `https://apis.data.go.kr/1230000/ad/BidPublicInfoService/getBidPblancListInfoServc?serviceKey=${API_KEY}&pageNo=1&numOfRows=500&inqryDiv=1&inqryBgnDt=${fmt(ago7)}&inqryEndDt=${fmt(today)}&type=json`;
            try {
                const res = await fetch(url);
                const json = await res.json();
                const items = json.response.body.items || [];
                processItems(items, '진행공고');
            } catch (e) { console.error("공고 수집 실패", e); }
        }

        // 2. 사전규격 수집 (사전규격공고조회)
        async function fetchPre() {
            const url = `https://apis.data.go.kr/1230000/ad/BidPublicInfoService/getPreBidPblancListInfo?serviceKey=${API_KEY}&pageNo=1&numOfRows=500&inqryBgnDt=${fmt(ago7)}&inqryEndDt=${fmt(today)}&type=json`;
            try {
                const res = await fetch(url);
                const json = await res.json();
                const items = json.response.body.items || [];
                processItems(items, '사전규격');
            } catch (e) { console.error("사전규격 수집 실패", e); }
        }

        function processItems(items, type) {
            const filtered = items.filter(item => KEYWORDS.some(kw => (item.bidNtceNm || item.prprePnNm || "").includes(kw)));
            filtered.forEach(item => {
                const id = item.bidNtceNo || item.bfSpecPblancNo;
                if (!dbData.find(d => (d.bidNtceNo || d.bfSpecPblancNo) === id)) {
                    const newItem = {
                        ...item,
                        dataType: type,
                        userStatus: "검토중",
                        userComment: "",
                        regDt: item.bidNtceDt || item.registrationDt || "",
                        title: item.bidNtceNm || item.prprePnNm || "",
                        org: item.dminsttNm || item.orderInsttNm || "",
                        id: id,
                        detailUrl: type === '진행공고' 
                            ? `https://www.g2b.go.kr/link/PNPE027_01/single/?bidPbancNo=${id}&bidPbancOrd=000`
                            : `https://www.g2b.go.kr/link/PNPE027_01/single/?bfSpecPblancNo=${id}`
                    };
                    dbData.unshift(newItem);
                    newCount++;
                    sendToSheet(newItem);
                }
            });
        }

        await Promise.all([fetchBids(), fetchPre()]);
        localStorage.setItem('plani_integrated_data', JSON.stringify(dbData));
        statusEl.className = 'status-box success';
        statusEl.innerText = `✅ 수집 완료! 신규 건 ${newCount}건 추가.`;
        renderTable();
    }

    async function sendToSheet(item) {
        if (!GOOGLE_SHEET_URL.startsWith("http")) return;
        try { await fetch(GOOGLE_SHEET_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(item) }); } catch (e) {}
    }

    function sortData() {
        const order = { "검토중": 1, "참여": 2, "보류": 3, "미참여": 4, "기타": 5 };
        dbData.sort((a, b) => order[a.userStatus] - order[b.userStatus] || b.regDt.localeCompare(a.regDt));
        localStorage.setItem('plani_integrated_data', JSON.stringify(dbData));
        renderTable();
        alert("중요도 및 최신 등록순으로 정렬되었습니다.");
    }

    function renderTable() {
        const tbody = document.getElementById('listBody');
        tbody.innerHTML = '';
        const checkedStatuses = Array.from(document.querySelectorAll('.status-filter:checked')).map(cb => cb.value);
        
        dbData.filter(item => checkedStatuses.includes(item.userStatus)).forEach((item) => {
            const tr = document.createElement('tr');
            const idxInDb = dbData.findIndex(d => d.id === item.id);
            const titleColor = item.dataType === '사전규격' ? 'var(--secondary)' : 'var(--primary)';
            const badgeClass = item.dataType === '사전규격' ? 'badge-pre' : 'badge-bid';
            
            let fileLinks = '';
            for(let i=1; i<=3; i++) {
                const fUrl = `https://www.g2b.go.kr/pn/pnp/pnpe/UntyAtchFile/downloadFile.do?bidPbancNo=${item.id}&bidPbancOrd=000&fileType=&fileSeq=${i}&prcmBsneSeCd=03`;
                fileLinks += `<a href="${fUrl}" class="file-link">[첨부${i}]</a>`;
            }

            tr.innerHTML = `
                <td><span class="type-badge ${badgeClass}">${item.dataType}</span></td>
                <td>${item.id}</td>
                <td><a href="${item.detailUrl}" target="_blank" style="color:${titleColor}; font-weight:bold; text-decoration:none;">${item.title}</a></td>
                <td>${item.org}</td>
                <td>${item.regDt.substring(5, 16)}</td>
                <td>${fileLinks}</td>
                <td>
                    <select onchange="updateRow('${item.id}', 'userStatus', this.value)">
                        ${['검토중','참여','보류','미참여','기타'].map(s => `<option value="${s}" ${item.userStatus===s?'selected':''}>${s}</option>`).join('')}
                    </select>
                </td>
                <td>
                    <input type="text" value="${item.userComment || ''}" onchange="updateRow('${item.id}', 'userComment', this.value)" placeholder="의견...">
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function updateRow(id, field, value) {
        const target = dbData.find(d => d.id === id);
        if(target) target[field] = value;
        localStorage.setItem('plani_integrated_data', JSON.stringify(dbData));
        renderTable();
    }

    function saveToCSV() {
        let csv = "\ufeff구분,공고번호,공고명,수요기관,등록일시,상태,의견\n";
        dbData.forEach(i => csv += `"${i.dataType}","${i.id}","${i.title}","${i.org}","${i.regDt}","${i.userStatus}","${i.userComment}"\n`);
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `PLANI_통합관리_${new Date().toISOString().slice(0,10)}.csv`;
        link.click();
    }
</script>
</body>
</html>
