<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>PLANI DX 통합 관리 시스템 v3.6 (Debug)</title>
    <style>
        :root { --primary: #005bac; --secondary: #2b8a3e; --bg: #f8f9fa; --border: #dee2e6; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1650px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        
        /* 실시간 상태 및 에러 로그 영역 */
        #status { padding: 12px; border-radius: 6px; margin-bottom: 10px; font-size: 13px; font-weight: bold; }
        .debug-log { background: #333; color: #00ff00; padding: 10px; border-radius: 6px; font-family: monospace; font-size: 11px; margin-bottom: 15px; max-height: 100px; overflow-y: auto; display: none; }
        
        .loading { background: #fff9db; color: #f08c00; }
        .success { background: #ebfbee; color: #2b8a3e; }
        .error { background: #fff5f5; color: #e03131; border: 1px solid #ffa8a8; }

        .filter-section { background: #fff; padding: 10px 15px; border-radius: 6px; font-size: 13px; margin-bottom: 15px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
        th { background: var(--primary); color: white; padding: 12px; position: sticky; top: 0; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .btn { padding: 10px 18px; border-radius: 6px; cursor: pointer; font-weight: bold; border: none; }
        .type-badge { padding: 3px 8px; border-radius: 4px; font-size: 11px; color: white; font-weight: bold; }
        .badge-bid { background: var(--primary); }
        .badge-pre { background: var(--secondary); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>🚀 통합 공고 모니터링 v3.6</h2>
        <div>
            <button class="btn" style="background:var(--primary); color:white;" onclick="syncData()">🔄 데이터 수집 시작</button>
            <button class="btn" style="background:#495057; color:white;" onclick="toggleDebug()">🐞 로그 보기</button>
        </div>
    </div>

    <div id="status" class="status-box success">준비 완료</div>
    <div id="debugLog" class="debug-log"></div>

    <div class="filter-section">
        <div>
            <strong>🎯 필터:</strong>
            <label><input type="checkbox" class="status-filter" value="검토중" checked onchange="renderTable()"> 검토중</label>
            <label><input type="checkbox" class="status-filter" value="참여" checked onchange="renderTable()"> 참여</label>
        </div>
        <button class="btn" style="font-size:12px; padding:5px 10px;" onclick="clearStorage()">데이터 초기화</button>
    </div>

    <table id="resultTable">
        <thead>
            <tr>
                <th>구분</th>
                <th>공고번호</th>
                <th>공고명</th>
                <th>수요기관</th>
                <th>등록일시</th>
                <th>상태</th>
            </tr>
        </thead>
        <tbody id="listBody"></tbody>
    </table>
</div>

<script>
    // ⚠️ 주의: API 키에 공백이나 특수문자가 포함되지 않았는지 확인하세요.
    const API_KEY = 'f5783d68424a4e6ae7aaada3e37732d82e7930868d612a3cc85279d2c2bb82d6';
    const KEYWORDS = ['홈페이지', '시스템', '플랫폼', '클라우드', '차세대', '고도화'];
    let dbData = JSON.parse(localStorage.getItem('plani_data_v36') || '[]');

    function log(msg, isError = false) {
        const logEl = document.getElementById('debugLog');
        logEl.innerHTML += `<div>${isError ? '❌' : 'ℹ️'} ${new Date().toLocaleTimeString()}: ${msg}</div>`;
        logEl.scrollTop = logEl.scrollHeight;
        if(isError) console.error(msg);
    }

    function toggleDebug() {
        const el = document.getElementById('debugLog');
        el.style.display = el.style.display === 'none' ? 'block' : 'none';
    }

    async function syncData() {
        const statusEl = document.getElementById('status');
        statusEl.className = 'status-box loading';
        statusEl.innerText = '⏳ 데이터 수집 중...';
        log('수집 프로세스 시작');

        const today = new Date();
        const ago7 = new Date(); ago7.setDate(today.getDate() - 7);
        const fmt = (d) => d.toISOString().slice(0,10).replace(/-/g, '') + "0000";

        try {
            // 1. 진행공고 (입찰공고)
            const bidUrl = `https://apis.data.go.kr/1230000/ad/BidPublicInfoService/getBidPblancListInfoServc?serviceKey=${API_KEY}&pageNo=1&numOfRows=100&inqryDiv=1&inqryBgnDt=${fmt(ago7)}&inqryEndDt=${fmt(today)}&type=json`;
            log('진행공고 API 호출 중...');
            const bidRes = await fetch(bidUrl);
            const bidJson = await bidRes.json();
            
            // 2. 사전규격
            const preUrl = `https://apis.data.go.kr/1230000/ad/BidPublicInfoService/getPreBidPblancListInfo?serviceKey=${API_KEY}&pageNo=1&numOfRows=100&inqryBgnDt=${fmt(ago7)}&inqryEndDt=${fmt(today)}&type=json`;
            log('사전규격 API 호출 중...');
            const preRes = await fetch(preUrl);
            const preJson = await preRes.json();

            processItems(bidJson.response?.body?.items || [], '진행공고');
            processItems(preJson.response?.body?.items || [], '사전규격');

            statusEl.className = 'status-box success';
            statusEl.innerText = `✅ 수집 완료 (총 ${dbData.length}건 저장됨)`;
            log('데이터 처리 및 저장 완료');
            renderTable();

        } catch (e) {
            statusEl.className = 'status-box error';
            statusEl.innerText = `❌ 오류 발생: ${e.message}`;
            log(`심각한 오류: ${e.message}`, true);
        }
    }

    function processItems(items, type) {
        if (!Array.isArray(items)) {
            log(`${type} 데이터 형식이 배열이 아닙니다.`, true);
            return;
        }

        items.forEach(item => {
            const title = item.bidNtceNm || item.prprePnNm || "";
            const id = item.bidNtceNo || item.bfSpecPblancNo;

            if (KEYWORDS.some(kw => title.includes(kw))) {
                if (!dbData.find(d => d.id === id)) {
                    dbData.unshift({
                        id: id,
                        title: title,
                        org: item.dminsttNm || item.orderInsttNm || "미확인",
                        regDt: item.bidNtceDt || item.registrationDt || "",
                        dataType: type,
                        userStatus: "검토중"
                    });
                }
            }
        });
        localStorage.setItem('plani_data_v36', JSON.stringify(dbData));
    }

    function renderTable() {
        const tbody = document.getElementById('listBody');
        tbody.innerHTML = '';
        const checked = Array.from(document.querySelectorAll('.status-filter:checked')).map(c => c.value);

        dbData.filter(d => checked.includes(d.userStatus)).forEach(item => {
            const tr = document.createElement('tr');
            const titleColor = item.dataType === '사전규격' ? 'var(--secondary)' : 'var(--primary)';
            const badgeClass = item.dataType === '사전규격' ? 'badge-pre' : 'badge-bid';
            
            tr.innerHTML = `
                <td><span class="type-badge ${badgeClass}">${item.dataType}</span></td>
                <td>${item.id}</td>
                <td style="color:${titleColor}; font-weight:bold;">${item.title}</td>
                <td>${item.org}</td>
                <td>${item.regDt.substring(5, 16)}</td>
                <td>${item.userStatus}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function clearStorage() {
        if(confirm('모든 데이터를 초기화할까요?')) {
            localStorage.removeItem('plani_data_v36');
            dbData = [];
            renderTable();
            log('데이터 초기화됨');
        }
    }
</script>
</body>
</html>
