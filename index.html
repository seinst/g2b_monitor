<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>PLANI DX 통합 관리 시스템 v3.7</title>
    <style>
        :root { --primary: #005bac; --secondary: #2b8a3e; --bg: #f8f9fa; --border: #dee2e6; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        #passwordModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f8f9fa; display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .login-box { background: white; padding: 40px; border-radius: 12px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 320px; border: 1px solid #eee; }
        #mainContent { display: none; padding: 20px; }
        .container { max-width: 1650px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .search-keywords { background: #e9ecef; padding: 10px 15px; border-radius: 6px; font-size: 13px; color: #495057; margin-bottom: 10px; border-left: 4px solid var(--primary); }
        .filter-section { background: #fff; padding: 10px 15px; border-radius: 6px; font-size: 13px; margin-bottom: 15px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        #status { padding: 12px; border-radius: 6px; margin-bottom: 15px; font-size: 13px; font-weight: bold; }
        .loading { background: #fff9db; color: #f08c00; }
        .success { background: #ebfbee; color: #2b8a3e; }
        .error { background: #fff5f5; color: #e03131; border: 1px solid #ffa8a8; }
        table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
        th { background: var(--primary); color: white; padding: 12px; position: sticky; top: 0; z-index: 10; }
        td { padding: 10px; border-bottom: 1px solid #eee; vertical-align: middle; }
        tr:hover { background: #f8f9fa; }
        .btn { padding: 10px 18px; border-radius: 6px; cursor: pointer; font-weight: bold; border: none; }
        .type-badge { padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; color: white; }
        .badge-bid { background: var(--primary); } 
        .badge-pre { background: var(--secondary); }
        .file-link { color: #d6336c; text-decoration: none; font-weight: bold; font-size: 11px; margin-right: 5px; }
    </style>
</head>
<body>

<div id="passwordModal">
    <div class="login-box">
        <h2 style="color:var(--primary); margin-top:0;">PLANI DX Monitor</h2>
        <input type="password" id="pwInput" placeholder="Password" style="width:80%; padding:12px; margin-bottom:20px; text-align:center; border:1px solid #ddd; border-radius:5px;">
        <button class="btn" style="background:var(--primary); color:white; width:90%;" onclick="checkPassword()">로그인</button>
        <p id="pwError" style="color:#e03131; display:none; margin-top:15px; font-size:13px;">❌ 비밀번호 오류</p>
    </div>
</div>

<div id="mainContent">
    <div class="container">
        <div class="header">
            <h2 style="margin:0;">🚀 통합 공고/사전규격 모니터링</h2>
            <div>
                <button class="btn" style="background:var(--primary); color:white;" onclick="syncData()">🔄 데이터 수집 시작</button>
                <button class="btn" style="background:var(--secondary); color:white;" onclick="saveToCSV()">📊 CSV 저장</button>
            </div>
        </div>

        <div class="search-keywords">
            <strong>🔍 검색어 :</strong> 홈페이지, 시스템, 플랫폼, 클라우드, 차세대, 고도화
        </div>

        <div class="filter-section">
            <div>
                <strong>🎯 필터:</strong>
                <label><input type="checkbox" class="status-filter" value="검토중" checked onchange="renderTable()"> 검토중</label>
                <label><input type="checkbox" class="status-filter" value="참여" checked onchange="renderTable()"> 참여</label>
            </div>
            <button class="btn" style="background:#495057; color:white; font-size:12px; padding:6px 12px;" onclick="sortData()">⇅ 중요도순 정렬</button>
        </div>

        <div id="status" class="status-box success">준비 완료</div>

        <table id="resultTable">
            <thead>
                <tr>
                    <th>구분</th>
                    <th>공고번호</th>
                    <th>공고명 (상세보기)</th>
                    <th>수요기관</th>
                    <th>등록일시</th>
                    <th>첨부파일</th>
                    <th>상태</th>
                </tr>
            </thead>
            <tbody id="listBody"></tbody>
        </table>
    </div>
</div>

<script>
    const CORRECT_PW = "plani_dx";
    const API_KEY = 'f5783d68424a4e6ae7aaada3e37732d82e7930868d612a3cc85279d2c2bb82d6';
    const KEYWORDS = ['홈페이지', '시스템', '플랫폼', '클라우드', '차세대', '고도화'];
    
    let dbData = JSON.parse(localStorage.getItem('plani_v37_data') || '[]');

    function checkPassword() {
        if (document.getElementById('pwInput').value === CORRECT_PW) {
            document.getElementById('passwordModal').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            renderTable();
        } else { document.getElementById('pwError').style.display = 'block'; }
    }

    async function syncData() {
        const statusEl = document.getElementById('status');
        statusEl.className = 'status-box loading';
        statusEl.innerText = '⏳ 공공데이터 포털에서 데이터를 수집하고 있습니다...';

        const today = new Date();
        const ago7 = new Date(); ago7.setDate(today.getDate() - 7);
        const fmt = (d) => d.toISOString().slice(0,10).replace(/-/g, '') + "0000";

        // CORS 우회용 프록시 서버 사용
        const proxy = "https://api.allorigins.win/get?url=";

        const bidUrl = encodeURIComponent(`https://apis.data.go.kr/1230000/ad/BidPublicInfoService/getBidPblancListInfoServc?serviceKey=${API_KEY}&pageNo=1&numOfRows=200&inqryDiv=1&inqryBgnDt=${fmt(ago7)}&inqryEndDt=${fmt(today)}&type=json`);
        const preUrl = encodeURIComponent(`https://apis.data.go.kr/1230000/ad/BidPublicInfoService/getPreBidPblancListInfo?serviceKey=${API_KEY}&pageNo=1&numOfRows=200&inqryBgnDt=${fmt(ago7)}&inqryEndDt=${fmt(today)}&type=json`);

        try {
            const [bidRes, preRes] = await Promise.all([
                fetch(proxy + bidUrl).then(r => r.json()),
                fetch(proxy + preUrl).then(r => r.json())
            ]);

            const bidItems = JSON.parse(bidRes.contents).response?.body?.items || [];
            const preItems = JSON.parse(preRes.contents).response?.body?.items || [];

            processItems(bidItems, '진행공고');
            processItems(preItems, '사전규격');

            statusEl.className = 'status-box success';
            statusEl.innerText = `✅ 수집 완료 (현재 총 ${dbData.length}건 관리 중)`;
            renderTable();
        } catch (e) {
            statusEl.className = 'status-box error';
            statusEl.innerText = `❌ 수집 실패: API 키 혹은 네트워크 상태를 확인하세요. (${e.message})`;
        }
    }

    function processItems(items, type) {
        items.forEach(item => {
            const title = item.bidNtceNm || item.prprePnNm || "";
            const id = item.bidNtceNo || item.bfSpecPblancNo;
            if (KEYWORDS.some(kw => title.includes(kw)) && !dbData.find(d => d.id === id)) {
                dbData.unshift({
                    id: id,
                    title: title,
                    org: item.dminsttNm || item.orderInsttNm || "미확인",
                    regDt: item.bidNtceDt || item.registrationDt || "",
                    dataType: type,
                    userStatus: "검토중",
                    detailUrl: type === '진행공고' 
                        ? `https://www.g2b.go.kr/link/PNPE027_01/single/?bidPbancNo=${id}&bidPbancOrd=000`
                        : `https://www.g2b.go.kr/link/PNPE027_01/single/?bfSpecPblancNo=${id}`
                });
            }
        });
        localStorage.setItem('plani_v37_data', JSON.stringify(dbData));
    }

    function renderTable() {
        const tbody = document.getElementById('listBody');
        tbody.innerHTML = '';
        const checked = Array.from(document.querySelectorAll('.status-filter:checked')).map(c => c.value);

        dbData.filter(d => checked.includes(d.userStatus)).forEach((item, idx) => {
            const tr = document.createElement('tr');
            const color = item.dataType === '사전규격' ? 'var(--secondary)' : 'var(--primary)';
            const badge = item.dataType === '사전규격' ? 'badge-pre' : 'badge-bid';
            
            let files = '';
            for(let i=1; i<=3; i++) {
                files += `<a href="https://www.g2b.go.kr/pn/pnp/pnpe/UntyAtchFile/downloadFile.do?bidPbancNo=${item.id}&bidPbancOrd=000&fileType=&fileSeq=${i}&prcmBsneSeCd=03" class="file-link">[첨부${i}]</a>`;
            }

            tr.innerHTML = `
                <td><span class="type-badge ${badge}">${item.dataType}</span></td>
                <td>${item.id}</td>
                <td><a href="${item.detailUrl}" target="_blank" style="color:${color}; font-weight:bold; text-decoration:none;">${item.title}</a></td>
                <td>${item.org}</td>
                <td>${item.regDt.substring(5, 16)}</td>
                <td>${files}</td>
                <td>
                    <select onchange="updateStatus('${item.id}', this.value)">
                        ${['검토중','참여','보류','미참여'].map(s => `<option value="${s}" ${item.userStatus===s?'selected':''}>${s}</option>`).join('')}
                    </select>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function updateStatus(id, val) {
        const target = dbData.find(d => d.id === id);
        if(target) target.userStatus = val;
        localStorage.setItem('plani_v37_data', JSON.stringify(dbData));
        renderTable();
    }

    function sortData() {
        const order = { "검토중": 1, "참여": 2, "보류": 3, "미참여": 4 };
        dbData.sort((a, b) => order[a.userStatus] - order[b.userStatus] || b.regDt.localeCompare(a.regDt));
        renderTable();
    }

    function saveToCSV() {
        let csv = "\ufeff구분,번호,공고명,기관,날짜,상태\n";
        dbData.forEach(i => csv += `"${i.dataType}","${i.id}","${i.title}","${i.org}","${i.regDt}","${i.userStatus}"\n`);
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `PLANI_DX_${new Date().toISOString().slice(0,10)}.csv`;
        link.click();
    }
</script>
</body>
</html>
