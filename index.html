<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>G2B 전략 공고 모니터링</title>
    <style>
        :root { --primary: #005bac; --bg: #f8f9fa; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .container { max-width: 1200px; margin: 20px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        /* 비밀번호 모달 스타일 */
        #passwordModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #f8f9fa; /* 배경을 흰색 계열로 하여 깔끔하게 */
            display: flex; justify-content: center; align-items: center; z-index: 10000;
        }
        .login-box { background: white; padding: 40px; border-radius: 10px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #eee; }
        input[type="password"] { padding: 12px; width: 220px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; margin-bottom: 15px; text-align: center; }
        .btn-login { background: var(--primary); color: white; width: 100%; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        /* 메인 컨텐츠는 처음에 숨김 */
        #mainContent { display: none; padding: 20px; }
        /* 기존 테이블/태그 스타일 유지 */
        .status-box { padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; font-weight: bold; }
        .loading { background: #fff9db; color: #f08c00; border: 1px solid #ffe066; }
        .success { background: #ebfbee; color: #2b8a3e; border: 1px solid #b2f2bb; }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--primary); color: white; padding: 12px; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        tr:hover { background: #f1f7ff; cursor: pointer; }
    </style>
</head>
<body>

<div id="passwordModal">
    <div class="login-box">
        <h2 style="margin-top:0; color:var(--primary);">PLANI DX Monitor</h2>
        <p style="color:#666; margin-bottom:20px;">비밀번호를 입력하세요.</p>
        <input type="password" id="pwInput" placeholder="Password" autofocus>
        <button class="btn-login" onclick="checkPassword()">접속하기</button>
        <p id="pwError" style="color:red; display:none; margin-top:10px; font-size:13px;">비밀번호가 틀렸습니다.</p>
    </div>
</div>

<div id="mainContent">
    <div class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2>🚀 G2B 전략 공고 리스트</h2>
            <button onclick="saveToCSV()" style="background:#2b8a3e; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; font-weight:bold;">📊 CSV 저장</button>
        </div>
        <div id="status" class="status-box loading">⏳ 분석 준비 중...</div>
        <table id="resultTable" style="display:none;">
            <thead>
                <tr><th>공고번호</th><th>공고명</th><th>수요기관</th><th>공고일시</th></tr>
            </thead>
            <tbody id="listBody"></tbody>
        </table>
    </div>
</div>

<script>
    const CORRECT_PW = "plani_dx";

    function checkPassword() {
        const input = document.getElementById('pwInput').value;
        if (input === CORRECT_PW) {
            document.getElementById('passwordModal').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            startApp();
        } else {
            document.getElementById('pwError').style.display = 'block';
            document.getElementById('pwInput').value = '';
        }
    }

    document.getElementById('pwInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') checkPassword(); });

    // 메인 로직 시작
    function startApp() {
        const API_KEY = decodeURIComponent('f5783d68424a4e6ae7aaada3e37732d82e7930868d612a3cc85279d2c2bb82d6');
        const KEYWORDS = ['홈페이지', '시스템', '플랫폼', '클라우드', '차세대', '고도화'];
        let results = [];

        const today = new Date();
        const ago7 = new Date();
        ago7.setDate(today.getDate() - 7);
        const bgnDt = (d => `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}0000`)(ago7);
        const endDt = (d => `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}0000`)(today);

        async function fetchPages(pageNo = 1) {
            document.getElementById('status').innerText = `⏳ ${pageNo}페이지 분석 중...`;
            const url = `https://apis.data.go.kr/1230000/ad/BidPublicInfoService/getBidPblancListInfoServc?serviceKey=${API_KEY}&pageNo=${pageNo}&numOfRows=999&inqryDiv=1&inqryBgnDt=${bgnDt}&inqryEndDt=${endDt}&type=json`;

            try {
                const res = await fetch(url);
                const data = await res.json();
                const items = data.response.body.items || [];
                results = [...results, ...items.filter(item => KEYWORDS.some(k => item.bidNtceNm.includes(k)))];
                
                if (items.length === 999 && pageNo < 5) return fetchPages(pageNo + 1);
                render(results);
            } catch (e) {
                document.getElementById('status').className = 'status-box error';
                document.getElementById('status').innerText = '❌ 에러 발생 (CORS 확인 필요)';
            }
        }

        function render(data) {
            const status = document.getElementById('status');
            status.className = 'status-box success';
            status.innerText = `✅ 분석 완료: 총 ${data.length}건`;
            document.getElementById('resultTable').style.display = 'table';
            const tbody = document.getElementById('listBody');
            data.forEach(item => {
                const tr = document.createElement('tr');
                tr.onclick = () => window.open(`https://www.g2b.go.kr:8081/ep/invitation/publish/bidInfoDtl.do?bidNtceNo=${item.bidNtceNo}&bidNtceOrd=${item.bidNtceOrd}`, '_blank');
                tr.innerHTML = `<td>${item.bidNtceNo}</td><td><strong>${item.bidNtceNm}</strong></td><td>${item.dminsttNm}</td><td>${item.bidNtceDt.substring(0, 16)}</td>`;
                tbody.appendChild(tr);
            });
        }
        fetchPages();
    }

    function saveToCSV() { /* 기존 CSV 저장 로직 동일 */ }
</script>
</body>
</html>
