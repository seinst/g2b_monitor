<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>G2B 전략 공고 모니터링 v1.6</title>
    <style>
        :root { --primary: #005bac; --accent: #e67e22; --bg: #f8f9fa; }
        body { font-family: 'Pretendard', 'Malgun Gothic', sans-serif; background: var(--bg); padding: 20px; color: #333; display: none; /* 비밀번호 확인 전까지 숨김 */ }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .btn-group { display: flex; gap: 10px; }
        button { cursor: pointer; border: none; border-radius: 6px; padding: 10px 18px; font-weight: bold; transition: 0.2s; }
        .btn-save { background-color: #2b8a3e; color: white; }
        .btn-save:hover { background-color: #237032; }
        .status-box { padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; font-weight: bold; }
        .loading { background: #fff9db; color: #f08c00; border: 1px solid #ffe066; }
        .success { background: #ebfbee; color: #2b8a3e; border: 1px solid #b2f2bb; }
        .tag-area { margin-bottom: 20px; padding: 15px; background: #f1f3f5; border-radius: 8px; }
        .tag { background: white; color: var(--primary); padding: 4px 10px; border-radius: 15px; border: 1px solid var(--primary); margin-right: 6px; font-size: 13px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: var(--primary); color: white; padding: 12px; font-size: 14px; position: sticky; top: 0; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; text-align: left; }
        tr:hover { background: #f1f7ff; cursor: pointer; }
    </small></style>
</head>
<body>

<div id="passwordModal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:flex; justify-content:center; align-items:center; z-index:9999;">
    <div style="background:white; padding:40px; border-radius:10px; text-align:center; box-shadow:0 4px 15px rgba(0,0,0,0.2);">
        <h3 style="margin-top:0;">🔐 보안 접속</h3>
        <p style="color:#666; font-size:14px; margin-bottom:20px;">시스템 비밀번호를 입력해 주세요.</p>
        <input type="password" id="pwInput" style="padding:12px; width:200px; border:1px solid #ddd; border-radius:5px; margin-bottom:15px; font-size:16px; text-align:center;">
        <br>
        <button onclick="checkPassword()" style="background:var(--primary); color:white; width:100%; padding:12px; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">접속하기</button>
        <p id="pwError" style="color:#c92a2a; font-size:13px; margin-top:10px; display:none;">❌ 비밀번호가 올바르지 않습니다.</p>
    </div>
</div>

<div class="container" id="mainContent" style="display:none;">
    <div class="header">
        <h2>🚀 전략 키워드 입찰공고 모니터링</h2>
        <div class="btn-group">
            <button class="btn-save" onclick="saveToCSV()">📊 엑셀(CSV) 저장</button>
        </div>
    </div>

    <div id="status" class="status-box loading">⏳ 데이터 분석을 시작합니다...</div>

    <div class="tag-area">
        <strong>추적 키워드:</strong> 
        <span id="keywordTags"></span>
    </div>

    <table id="resultTable" style="display:none;">
        <thead>
            <tr>
                <th>공고번호</th>
                <th>공고명</th>
                <th>수요기관</th>
                <th>공고일시</th>
            </tr>
        </thead>
        <tbody id="listBody"></tbody>
    </table>
</div>

<script>
    // [비밀번호 보안 로직]
    const CORRECT_PW = "plani_dx"; 
    
    function checkPassword() {
        const inputPw = document.getElementById('pwInput').value;
        const errorEl = document.getElementById('pwError');
        const modalEl = document.getElementById('passwordModal');
        const contentEl = document.getElementById('mainContent');

        if (inputPw === CORRECT_PW) {
            // 비밀번호 일치 시 모달 숨기고 메인 콘텐츠 표시
            modalEl.style.display = 'none';
            contentEl.style.display = 'block';
            document.body.style.display = 'block'; // body 표시
            startApp(); // 앱 실행
        } else {
            errorEl.style.display = 'block';
            document.getElementById('pwInput').value = ''; // 입력창 초기화
        }
    }

    // 엔터키 입력 시 비밀번호 확인
    document.getElementById('pwInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') checkPassword();
    });

    // 기존 앱 실행 로직을 함수로 감싸 비밀번호 확인 후 실행되도록 변경
    function startApp() {
        const ENCODED_KEY = 'f5783d68424a4e6ae7aaada3e37732d82e7930868d612a3cc85279d2c2bb82d6';
        const API_KEY = decodeURIComponent(ENCODED_KEY);
        const KEYWORDS = ['홈페이지', '시스템', '플랫폼', '클라우드', '차세대', '고도화'];
        let filteredResults = [];

        document.getElementById('keywordTags').innerHTML = KEYWORDS.map(k => `<span class="tag">#${k}</span>`).join('');

        const today = new Date();
        const ago7 = new Date();
        ago7.setDate(today.getDate() - 7);
        const bgnDt = (d => `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}0000`)(ago7);
        const endDt = (d => `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}0000`)(today);

        async function fetchAllPages(pageNo = 1) {
            const statusEl = document.getElementById('status');
            statusEl.innerText = `⏳ ${pageNo}페이지 분석 중... (최근 7일 데이터 전수조사)`;
            const url = `https://apis.data.go.kr/1230000/ad/BidPublicInfoService/getBidPblancListInfoServc?serviceKey=${API_KEY}&pageNo=${pageNo}&numOfRows=999&inqryDiv=1&inqryBgnDt=${bgnDt}&inqryEndDt=${endDt}&type=json`;

            try {
                const response = await fetch(url);
                const resData = await response.json();
                if (resData.response.header.resultCode !== '00') throw new Error(resData.response.header.resultMsg);
                const items = resData.response.body.items || [];
                const matched = items.filter(item => KEYWORDS.some(kw => item.bidNtceNm.includes(kw)));
                filteredResults = [...filteredResults, ...matched];
                if (items.length === 999 && pageNo < 5) return fetchAllPages(pageNo + 1);
                else renderResults();
            } catch (err) {
                statusEl.className = 'status-box error';
                statusEl.innerText = `❌ 오류: ${err.message} (CORS 확장 프로그램을 확인하세요)`;
            }
        }

        function renderResults() {
            const statusEl = document.getElementById('status');
            const table = document.getElementById('resultTable');
            const tbody = document.getElementById('listBody');
            statusEl.className = 'status-box success';
            statusEl.innerText = `✅ 분석 완료! 총 ${filteredResults.length}건의 전략 공고가 발견되었습니다. (최근 7일 기준)`;
            table.style.display = 'table';
            filteredResults.forEach(item => {
                const tr = document.createElement('tr');
                tr.onclick = () => window.open(`https://www.g2b.go.kr:8081/ep/invitation/publish/bidInfoDtl.do?bidNtceNo=${item.bidNtceNo}&bidNtceOrd=${item.bidNtceOrd}`, '_blank');
                tr.innerHTML = `<td>${item.bidNtceNo}</td><td><strong>${item.bidNtceNm}</strong></td><td>${item.dminsttNm}</td><td>${item.bidNtceDt.substring(0, 16)}</td>`;
                tbody.appendChild(tr);
            });
        }
        fetchAllPages();
    }
</script>
</body>
</html>
